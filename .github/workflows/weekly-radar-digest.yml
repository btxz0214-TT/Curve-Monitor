# Weekly HIGH summary: start async scan (short HTTP), poll job, then Resend from GitHub Secrets.
# Avoids gateway 504 on long synchronous POST /run-scan (Koyeb/nginx timeouts).
#
# Repo → Settings → Secrets and variables → Actions:
#   RADAR_BASE_URL      https://YOUR-SERVICE.ai-builders.space  (no trailing slash)
#   (or RADAR_URL — same value, if you used the old name)
#   RESEND_API_KEY
#   WEEKLY_DIGEST_TO
# Optional:
#   RESEND_FROM         e.g. Radar <onboarding@resend.dev>
#   RUN_SCAN_SECRET     must match RUN_SCAN_SECRET on the deployed app (if you set it there)

name: Weekly radar HIGH digest

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Async scan + poll + Resend HIGH summary
        env:
          RADAR_BASE_URL: ${{ secrets.RADAR_BASE_URL }}
          RADAR_URL: ${{ secrets.RADAR_URL }}
          RUN_SCAN_SECRET: ${{ secrets.RUN_SCAN_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WEEKLY_DIGEST_TO: ${{ secrets.WEEKLY_DIGEST_TO }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: |
          set -eo pipefail
          BASE_RAW="${RADAR_BASE_URL:-}"
          if [ -z "$BASE_RAW" ]; then BASE_RAW="${RADAR_URL:-}"; fi
          BASE_RAW="$(echo -n "$BASE_RAW" | tr -d '\r\n' | sed 's/[[:space:]]*$//')"
          missing=""
          if [ -z "$BASE_RAW" ]; then missing="$missing RADAR_BASE_URL"; fi
          if [ -z "${RESEND_API_KEY:-}" ]; then missing="$missing RESEND_API_KEY"; fi
          if [ -z "${WEEKLY_DIGEST_TO:-}" ]; then missing="$missing WEEKLY_DIGEST_TO"; fi
          if [ -n "$missing" ]; then
            echo "Missing or empty repository secrets:$missing"
            echo "Create them under Settings → Secrets and variables → Actions (names are case-sensitive)."
            echo "RADAR_BASE_URL must be like https://your-service.ai-builders.space with no trailing slash."
            exit 1
          fi
          BASE="${BASE_RAW%/}"

          SECRET_HDR=()
          if [ -n "${RUN_SCAN_SECRET:-}" ]; then
            SECRET_HDR=(-H "X-Run-Scan-Secret: $RUN_SCAN_SECRET")
          fi

          ac=$(curl -sS -o async.json -w "%{http_code}" \
            -X POST "$BASE/run-scan/async" \
            "${SECRET_HDR[@]}" \
            -H "Accept: application/json" \
            --max-time 120)
          echo "POST /run-scan/async HTTP $ac"
          cat async.json
          if [ "$ac" != "200" ]; then
            exit 1
          fi
          job_id=$(python3 -c "import json; print(json.load(open('async.json'))['job_id'])")
          echo "job_id=$job_id"

          got=""
          for i in $(seq 1 120); do
            pc=$(curl -sS -o poll.json -w "%{http_code}" \
              "$BASE/run-scan/jobs/$job_id" \
              -H "Accept: application/json" \
              --max-time 90)
            echo "poll $i HTTP $pc"
            if [ "$pc" = "200" ]; then
              cp poll.json response.json
              got=1
              break
            fi
            if [ "$pc" = "500" ]; then
              cat poll.json
              exit 1
            fi
            if [ "$pc" != "202" ]; then
              cat poll.json
              echo "Unexpected poll status"
              exit 1
            fi
            sleep 15
          done
          if [ -z "$got" ]; then
            echo "Timed out waiting for scan (max ~30 minutes)."
            exit 1
          fi
          python3 scripts/resend_weekly_high.py response.json
